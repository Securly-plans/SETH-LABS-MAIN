<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Save & Load2</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #ecf0f1; }
        nav { background: var(--primary); padding: 1rem; color: white; display: flex; justify-content: space-between; align-items: center; }
        #search { padding: 8px; border-radius: 4px; border: none; width: 250px; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 30px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .btn { display: block; background: var(--accent); color: white; text-decoration: none; padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <h2>Study Library</h2>
    <input type="text" id="search" placeholder="Search resources..." onkeyup="filterGames()">
</nav>

<div class="container" id="game-container">
    <!-- Games will be injected here -->
</div>

<script>
    let gamesData = [];

    async function loadGames() {
        const response = await fetch('games.json');
        gamesData = await response.json();
        displayGames(gamesData);
    }

    function displayGames(list) {
        const container = document.getElementById('game-container');
        container.innerHTML = list.map(game => `
            <div class="card">
                <img src="${game.image}" alt="${game.name}">
                <div class="card-info">
                    <h3>${game.name}</h3>
                    <a href="${game.path}" class="btn">Open Module</a>
                </div>
            </div>
        `).join('');
    }

    function filterGames() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = gamesData.filter(g => g.name.toLowerCase().includes(term));
        displayGames(filtered);
    }

    loadGames();
</script>
</body>
</html>
